    <script>

        async function doGet(e) {

            let sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("players");

            let data = sheet.getDataRange().getValues();

            // limite 32 joueurs
            if (data.length > 32) {
                return ContentService.createTextOutput("FULL");
            }

            sheet.appendRow([
                e.parameter.Nom,
                e.parameter.Pseudo,
                e.parameter.WhatsApp,
                e.parameter.Email,
                e.parameter.Equipe
            ]);

            return ContentService.createTextOutput("OK");
        }


        function doGet(e) {

            let sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("players");
            let data = sheet.getDataRange().getValues();

            let action = e.parameter.action;

            // 📋 LISTE JOUEURS
            if (action == "players") {

                let res = [];

                for (let i = 1; i < data.length; i++) {
                    res.push({
                        nom: data[i][0],
                        pseudo: data[i][1],
                        equipe: data[i][4]
                    });
                }

                return ContentService
                    .createTextOutput(JSON.stringify(res))
                    .setMimeType(ContentService.MimeType.JSON);
            }

            return ContentService.createTextOutput("OK");
        }
